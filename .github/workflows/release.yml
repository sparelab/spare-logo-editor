name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build standalone binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run scripts/release-build.ts
      # Tarball each binary so the download URL pattern is stable for both
      # GitHub releases and the Homebrew formula.
      - name: Tarball binaries
        run: |
          set -euo pipefail
          cd dist/release
          for bin in spare-logo-editor-*; do
            tar -czf "${bin}.tar.gz" "$bin"
            shasum -a 256 "${bin}.tar.gz" | awk '{print $1"  "$2}' >> SHASUMS256.txt
          done
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/release/

  publish-release:
    name: Publish GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/spare-logo-editor-*.tar.gz
            dist/release/SHASUMS256.txt
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew formula
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/release/
      - name: Compute version + sha256
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          base="https://github.com/${{ github.repository }}/releases/download/v$VERSION"
          for plat in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            sha=$(shasum -a 256 "dist/release/spare-logo-editor-${plat}.tar.gz" | awk '{print $1}')
            echo "sha_${plat//-/_}=$sha" >> "$GITHUB_OUTPUT"
          done
          echo "base=$base" >> "$GITHUB_OUTPUT"
      - name: Render formula
        run: |
          mkdir -p tap-out
          cat > tap-out/spare-logo-editor.rb <<RUBY
          # Auto-generated by release.yml — do not hand-edit.
          class SpareLogoEditor < Formula
            desc  "Terminal CLI editor for SGR pixel art (INK + mouse + AI)"
            homepage "https://github.com/${{ github.repository }}"
            version "${{ steps.meta.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${{ steps.meta.outputs.base }}/spare-logo-editor-darwin-arm64.tar.gz"
                sha256 "${{ steps.meta.outputs.sha_darwin_arm64 }}"
              else
                url "${{ steps.meta.outputs.base }}/spare-logo-editor-darwin-x64.tar.gz"
                sha256 "${{ steps.meta.outputs.sha_darwin_x64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${{ steps.meta.outputs.base }}/spare-logo-editor-linux-arm64.tar.gz"
                sha256 "${{ steps.meta.outputs.sha_linux_arm64 }}"
              else
                url "${{ steps.meta.outputs.base }}/spare-logo-editor-linux-x64.tar.gz"
                sha256 "${{ steps.meta.outputs.sha_linux_x64 }}"
              end
            end

            def install
              binname = "spare-logo-editor-#{OS.mac? ? "darwin" : "linux"}-#{Hardware::CPU.arm? ? "arm64" : "x64"}"
              bin.install binname => "spare-logo-editor"
            end

            test do
              assert_match "Usage", shell_output("\#{bin}/spare-logo-editor --help")
            end
          end
          RUBY
          cat tap-out/spare-logo-editor.rb
      - name: Push to homebrew tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Tap repo: github.com/<owner>/homebrew-tap
          TAP_REPO: ${{ github.repository_owner }}/homebrew-tap
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp tap-out/spare-logo-editor.rb tap/Formula/spare-logo-editor.rb

          # (Re)write the tap README so the install instructions stay in sync.
          cat > tap/README.md <<'MD'
          # sparelab/homebrew-tap

          Homebrew tap maintained by [sparelab](https://github.com/sparelab).

          ## Formulae

          ### [spare-logo-editor](https://github.com/sparelab/spare-logo-editor)

          Terminal CLI editor for SGR pixel-art images — INK + mouse, with
          PNG/JPG import and AI logo generation via GenX.

          ```sh
          brew tap sparelab/tap
          brew install spare-logo-editor
          ```
          MD

          cd tap
          git config user.email "actions@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Formula/spare-logo-editor.rb README.md
          git commit -m "spare-logo-editor ${VERSION}" || echo "no changes"
          git push
